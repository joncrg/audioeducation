<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Digital Audio — Active Study</title>
<style>
  :root{
    --navy:#14203A; --navy2:#22324F; --ink:#1B2A4A; --gold:#C77E2A; --gold2:#E0A458;
    --teal:#3E9C92; --paper:#EEF2F8; --card:#FFFFFF; --line:#DCE4EF; --muted:#6B7791;
    --body:#33405A; --scope:#0E1730; --red:#C7553E;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.5}
  .topbar{position:sticky;top:0;z-index:20;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:12px 22px;gap:16px;box-shadow:0 2px 10px rgba(10,18,35,.25)}
  .mark{display:flex;align-items:center;gap:12px;font-weight:700;letter-spacing:.16em;font-size:14px;text-transform:uppercase}
  .mark svg{width:34px;height:22px}
  .mark small{display:block;letter-spacing:.18em;color:#9fb0cc;font-size:10px;font-weight:600;margin-top:1px}
  .prog{font-family:var(--mono);font-size:12px;color:#cfdaec;text-align:right;white-space:nowrap}
  .prog b{color:var(--gold2)}
  .prog .bar{margin-top:5px;width:130px;height:5px;border-radius:3px;background:#2c3d5c;overflow:hidden}
  .prog .bar i{display:block;height:100%;width:0;background:var(--gold2);transition:width .4s}
  .tabs{position:sticky;top:50px;z-index:19;background:var(--card);border-bottom:1px solid var(--line);display:flex;gap:2px;padding:0 14px;overflow-x:auto}
  .tabs button{appearance:none;border:0;background:none;font-family:var(--sans);font-size:14px;font-weight:600;color:var(--muted);padding:14px 14px 11px;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-1px}
  .tabs button:hover{color:var(--ink)}
  .tabs button[aria-selected="true"]{color:var(--ink);border-bottom-color:var(--gold)}
  .wrap{max-width:1000px;margin:0 auto;padding:26px 20px 70px}
  h1.page{font-size:25px;margin:.1em 0 .15em;letter-spacing:-.01em}
  .lead{color:var(--body);max-width:64ch;margin:.2em 0 1.4em}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:4px}
  .grouphead{margin:28px 0 12px}
  .grouphead .k{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:700}
  .grouphead .t{font-size:18px;font-weight:700;color:var(--ink);margin-top:2px}
  .grouphead .d{font-size:13px;color:var(--muted)}

  .art{background:linear-gradient(160deg,#fafbfe,#eef3fa);border-radius:10px;display:flex;align-items:center;justify-content:center}
  .art svg{width:100%;height:auto;display:block}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:14px}
  .ccard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;text-align:left}
  .ccard:hover{transform:translateY(-3px);box-shadow:0 10px 22px rgba(20,32,58,.10);border-color:#c6d4e6}
  .ccard .art{height:96px;margin-bottom:10px;padding:6px}
  .ccard h3{margin:0;font-size:15px}
  .ccard p{margin:4px 0 0;color:var(--muted);font-size:12.5px}

  .overlay{position:fixed;inset:0;background:rgba(15,23,40,.55);display:none;z-index:40;padding:24px;overflow:auto}
  .overlay.on{display:flex;align-items:flex-start;justify-content:center}
  .panel{background:var(--card);border-radius:16px;max-width:680px;width:100%;margin:auto;overflow:hidden;box-shadow:0 24px 60px rgba(10,18,35,.4)}
  .panel .head{display:flex;gap:18px;padding:18px 22px;background:linear-gradient(150deg,#fafbfe,#eaf0f9);border-bottom:1px solid var(--line);align-items:center}
  .panel .head .art{width:190px;min-width:190px;height:104px;padding:6px}
  .panel .head h2{margin:0 0 2px;font-size:21px}
  .panel .head .sub{color:var(--muted);font-size:12.5px;font-family:var(--mono)}
  .panel .body{padding:18px 22px}
  .panel .body p{margin:0 0 12px;color:var(--body);font-size:14px}
  .formula{font-family:var(--mono);background:#11203f;color:#dbe7ff;border-radius:8px;padding:9px 13px;display:inline-block;font-size:13.5px;margin:0 0 12px}
  .formula b{color:var(--gold2)}
  .note{border-radius:10px;padding:12px 14px;font-size:13.5px}
  .note.why{background:#eef4f3;border:1px solid #d6e8e4}.note.why b{color:#22685f}
  .note.comp{background:#f3f6fb;border:1px solid var(--line);margin-bottom:12px}.note.comp b{color:var(--ink)}
  .x{margin-left:auto;appearance:none;border:1px solid var(--line);background:#fff;border-radius:8px;width:34px;height:34px;font-size:18px;cursor:pointer;color:var(--muted)}
  .x:hover{color:var(--ink);border-color:#c6d4e6}

  .btn{appearance:none;border:0;border-radius:10px;font-family:var(--sans);font-weight:650;font-size:14px;padding:11px 18px;cursor:pointer}
  .btn.primary{background:var(--navy);color:#fff}.btn.primary:hover{background:#1d2c4a}
  .btn.gold{background:var(--gold);color:#fff}.btn.gold:hover{background:#b06f22}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}.btn.ghost:hover{border-color:#c6d4e6}
  .btn.ok{background:#e4f3f0;color:#1f6b62;border:1px solid #c9e7e1}
  .btn.again{background:#fbeede;color:#9a5a16;border:1px solid #f3dcc0}
  .btn.sm{padding:8px 13px;font-size:13px}
  .btn.tog{background:#fff;border:1px solid var(--line);color:var(--ink)}
  .btn.tog[aria-pressed="true"]{background:var(--navy);color:#fff;border-color:var(--navy)}

  .station{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:18px;box-shadow:0 8px 24px rgba(20,32,58,.05)}
  .station h3{margin:0 0 2px;font-size:18px}
  .station .ssub{color:var(--muted);font-size:13px;margin-bottom:13px}
  .scope{background:var(--scope);border-radius:12px;padding:6px;position:relative}
  .scope canvas{display:block;width:100%;height:200px}
  .ctl{display:grid;grid-template-columns:118px 1fr 116px;align-items:center;gap:12px;margin-top:13px}
  .ctl label{font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
  .ctl .val{font-family:var(--mono);font-size:13px;color:var(--ink);text-align:right}
  input[type=range]{width:100%;accent-color:var(--gold);height:26px;cursor:pointer}
  .lab-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;align-items:center}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .readout{font-family:var(--mono);font-size:13px;color:var(--ink);background:#f3f6fb;border:1px solid var(--line);border-radius:8px;padding:7px 11px}
  .readout b{color:var(--gold)}
  .readout.warn{background:#fbecea;border-color:#ecc4bd;color:#a23b28}.readout.warn b{color:#a23b28}
  .notice{font-size:12.5px;color:var(--muted);background:#fbf6ee;border:1px solid #efe1cb;border-radius:8px;padding:9px 12px;margin-top:13px}
  .tip{font-size:13.5px;color:var(--body);margin-top:12px}.tip b{color:var(--ink)}

  .stage{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px;max-width:600px;margin:0 auto;text-align:center;box-shadow:0 8px 24px rgba(20,32,58,.06)}
  .stage .art{height:150px;padding:10px;margin:0 auto 12px;max-width:340px}
  .counter{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.05em}
  .prompt{font-size:15px;color:var(--body);margin:10px auto 16px;max-width:48ch}
  .reveal{border-top:1px dashed var(--line);margin-top:16px;padding-top:16px;text-align:left}
  .reveal p{margin:0 0 10px;font-size:14px;color:var(--body)}
  .actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px}
  .opts{display:grid;gap:9px;margin:6px auto 0;max-width:520px;text-align:left}
  .opt{appearance:none;border:1px solid var(--line);background:#fff;border-radius:10px;padding:13px 15px;font-size:14.5px;font-family:var(--sans);cursor:pointer;color:var(--ink);transition:.1s}
  .opt:hover:not(:disabled){border-color:#9fb6d6;background:#f7faff}
  .opt:disabled{cursor:default}
  .opt.correct{background:#e4f3f0;border-color:#7cc6bb;color:#1c5f57;font-weight:600}
  .opt.wrong{background:#fbe9e9;border-color:#e3a3a3;color:#9a3a3a}
  .explain{margin:14px auto 0;max-width:520px;background:#f3f6fb;border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:13.5px;color:var(--body);text-align:left;display:none}
  .explain.on{display:block}.explain b{color:var(--ink)}
  .scorebar{font-family:var(--mono);font-size:12px;color:var(--muted);text-align:center;margin-bottom:14px}
  .bigscore{font-size:46px;font-weight:800;color:var(--navy);text-align:center;line-height:1}
  .bigscore span{color:var(--gold)}

  .steps{counter-reset:s;display:grid;gap:14px;margin:18px 0}
  .step{display:grid;grid-template-columns:42px 1fr;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .step .n{counter-increment:s;font-family:var(--mono);font-weight:700;color:#fff;background:var(--navy);width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center}
  .step .n::before{content:counter(s)}
  .step h3{margin:0 0 3px;font-size:16px}.step p{margin:0;color:var(--body);font-size:13.5px}
  .callout{background:linear-gradient(150deg,#1a2742,#22324f);color:#dbe4f2;border-radius:12px;padding:16px 18px;margin:18px 0;font-size:14px}
  .callout b{color:var(--gold2)}
  footer{border-top:1px solid var(--line);text-align:center;color:var(--muted);font-size:12px;padding:22px;font-family:var(--mono);letter-spacing:.04em}
  @media (max-width:560px){.panel .head{flex-direction:column;align-items:flex-start}.ctl{grid-template-columns:92px 1fr 80px}}
  @media (prefers-reduced-motion:reduce){.ccard{transition:none}}
  :focus-visible{outline:3px solid var(--gold2);outline-offset:2px;border-radius:6px}
</style>
</head>
<body>
<div class="topbar">
  <div class="mark">
    <svg viewBox="0 0 40 22"><path d="M2 11 H8 V5 H14 V16 H20 V8 H26 V13 H32 V6 H38" fill="none" stroke="#E0A458" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/></svg>
    <div>Digital Audio<small>Active study · University of Evansville &nbsp;•&nbsp; Creative Techologies &nbsp;•&nbsp; Prof. Jon Robertson</small></div>
  </div>
  <div class="prog" id="prog">Mastered <b><span id="pm">0</span>/10</b><div class="bar"><i id="pbar"></i></div></div>
</div>
<nav class="tabs" id="tabs" role="tablist">
  <button role="tab" data-tab="howto" aria-selected="true">How to use this</button>
  <button role="tab" data-tab="learn" aria-selected="false">Learn</button>
  <button role="tab" data-tab="lab" aria-selected="false">Lab · hear it</button>
  <button role="tab" data-tab="cards" aria-selected="false">Flashcards</button>
  <button role="tab" data-tab="quiz" aria-selected="false">Quiz</button>
</nav>
<main class="wrap" id="view"></main>
<div class="overlay" id="overlay"><div class="panel" id="panel"></div></div>
<footer>University of Evansville · Creative Technologies &nbsp;•&nbsp; Audio Engineering &nbsp;•&nbsp; Digital Audio Basics &nbsp;•&nbsp; Jon Robertson</footer>

<script>
/* ============ helpers: waves ============ */
function sineD(W,H,o){const A=o.A??16,n=o.n??3,ph=o.ph??0,mid=o.mid??H/2,sm=o.sm??160,clip=o.clip??null;let d='';for(let i=0;i<=sm;i++){const x=W*i/sm;let v=A*Math.sin(2*Math.PI*(n*i/sm)+ph);if(clip!=null){if(v>clip)v=clip;if(v<-clip)v=-clip;}const y=mid-v;d+=(i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1);}return d;}
function path(d,st,sw,extra){return `<path d='${d}' fill='none' stroke='${st}' stroke-width='${sw??2.4}' stroke-linecap='round'${extra||''}/>`;}

/* ============ concept diagrams ============ */
const VIZ={
 converters:()=>`<svg viewBox='0 0 220 96'>${path(sineD(54,96,{n:1.4,A:14,mid:48}),'#C77E2A',2.4)}
   ${[0,1,2,3,4,5].map(i=>{const x=8+i*9;const y=48-13*Math.sin(2*Math.PI*1.4*(x)/54);return `<line x1='${x}' y1='48' x2='${x}' y2='${y.toFixed(1)}' stroke='#3E9C92' stroke-width='1.5'/><circle cx='${x}' cy='${y.toFixed(1)}' r='2' fill='#3E9C92'/>`;}).join('')}
   <text x='70' y='52' font-size='12' fill='#1B2A4A' font-family='monospace'>0110</text><path d='M96 48 h20' stroke='#9aa6b8' stroke-width='2'/><path d='M110 43 l6 5 l-6 5' fill='none' stroke='#9aa6b8' stroke-width='2'/>
   ${path(sineD(54,96,{n:1.4,A:14,mid:48}).replace(/([ML])([\\d.]+) /g,(m,c,x)=>c+(parseFloat(x)+150)+' '),'#C77E2A',2.4)}
   <text x='8' y='84' font-size='8' fill='#6B7791' font-family='monospace'>A/D</text><text x='150' y='84' font-size='8' fill='#6B7791' font-family='monospace'>D/A</text></svg>`,
 sampleRate:()=>`<svg viewBox='0 0 220 96'>${path(sineD(220,96,{n:2,A:24,mid:48}),'#cbd4e3',2)}
   ${Array.from({length:18}).map((_,i)=>{const x=6+i*12;const y=48-24*Math.sin(2*Math.PI*2*x/220);return `<line x1='${x}' y1='48' x2='${x}' y2='${y.toFixed(1)}' stroke='#C77E2A' stroke-width='1.3'/><circle cx='${x}' cy='${y.toFixed(1)}' r='2.2' fill='#C77E2A'/>`;}).join('')}
   <text x='6' y='90' font-size='9' fill='#8a521b' font-family='monospace'>samples per second</text></svg>`,
 bitDepth:()=>{const levels=6;let steps='';let px=0,py=48;for(let i=0;i<=40;i++){const x=i*5.4;const v=Math.sin(2*Math.PI*1.5*x/220);const q=Math.round((v*0.5+0.5)*(levels-1))/(levels-1);const y=48-(q*2-1)*24;if(i===0){steps=`M${x} ${y}`;}else{steps+=`L${x} ${py} L${x} ${y}`;}py=y;}
   return `<svg viewBox='0 0 220 96'>${[0,1,2,3,4,5].map(i=>`<line x1='0' y1='${24+i*9.6}' x2='220' y2='${24+i*9.6}' stroke='#E7ECF3' stroke-width='1'/>`).join('')}${path(sineD(220,96,{n:1.5,A:24,mid:48}),'#cbd4e3',1.6)}${path(steps,'#C77E2A',2.4)}<text x='6' y='90' font-size='9' fill='#8a521b' font-family='monospace'>amplitude steps = 2^bits</text></svg>`;},
 dbfs:()=>`<svg viewBox='0 0 220 96'><rect x='150' y='10' width='26' height='76' rx='3' fill='#11203f'/><rect x='152' y='12' width='22' height='12' fill='#C7553E'/><rect x='152' y='26' width='22' height='24' fill='#E0A458'/><rect x='152' y='52' width='22' height='32' fill='#3E9C92'/><text x='180' y='18' font-size='9' fill='#C7553E' font-family='monospace'>0</text><text x='180' y='40' font-size='9' fill='#6B7791' font-family='monospace'>-12</text><text x='180' y='70' font-size='9' fill='#6B7791' font-family='monospace'>-40</text><text x='10' y='44' font-size='11' fill='#1B2A4A' font-family='monospace'>0 dBFS = top.</text><text x='10' y='60' font-size='10' fill='#6B7791' font-family='monospace'>below it is negative</text></svg>`,
 digitalZero:()=>`<svg viewBox='0 0 220 96'><line x1='0' y1='20' x2='220' y2='20' stroke='#C7553E' stroke-width='2'/><text x='6' y='15' font-size='9' fill='#C7553E' font-family='monospace'>0 dBFS \u2014 the ceiling</text>${path(sineD(220,96,{n:2,A:26,mid:54}),'#C77E2A',2.4)}<text x='150' y='86' font-size='9' fill='#6B7791' font-family='monospace'>peaks reach, don\u2019t cross</text></svg>`,
 clipping:()=>`<svg viewBox='0 0 220 96'><line x1='0' y1='20' x2='220' y2='20' stroke='#C7553E' stroke-width='1.5' stroke-dasharray='4 3'/><line x1='0' y1='76' x2='220' y2='76' stroke='#C7553E' stroke-width='1.5' stroke-dasharray='4 3'/>${path(sineD(220,96,{n:2,A:40,mid:48,clip:28}),'#C7553E',2.6)}<text x='70' y='14' font-size='9' fill='#a23b28' font-family='monospace'>flat tops = distortion</text></svg>`,
 wav:()=>`<svg viewBox='0 0 220 96'><rect x='30' y='16' width='64' height='64' rx='6' fill='#fff' stroke='#1B2A4A' stroke-width='2'/><path d='M78 16 v14 h14' fill='none' stroke='#1B2A4A' stroke-width='2'/><text x='40' y='44' font-size='13' fill='#C77E2A' font-family='monospace' font-weight='bold'>WAV</text>${path(sineD(44,96,{n:3,A:7,mid:60}).replace(/([ML])([\\d.]+) /g,(m,c,x)=>c+(parseFloat(x)+40)+' '),'#3E9C92',1.8)}<text x='112' y='40' font-size='11' fill='#1B2A4A' font-family='monospace'>uncompressed</text><text x='112' y='56' font-size='10' fill='#6B7791' font-family='monospace'>PCM \u00b7 lossless</text></svg>`,
 metadata:()=>`<svg viewBox='0 0 220 96'><rect x='26' y='16' width='56' height='64' rx='6' fill='#fff' stroke='#1B2A4A' stroke-width='2'/>${path(sineD(40,96,{n:3,A:8,mid:48}).replace(/([ML])([\\d.]+) /g,(m,c,x)=>c+(parseFloat(x)+34)+' '),'#C77E2A',1.8)}<g font-family='monospace' font-size='9' fill='#6B7791'><text x='100' y='30'>48 kHz \u00b7 24-bit</text><text x='100' y='46'>2 ch \u00b7 00:03:21</text><text x='100' y='62'>scene 4 / take 2</text></g><text x='100' y='80' font-size='8' fill='#8a521b' font-family='monospace'>data about the audio</text></svg>`,
 zeroCross:()=>{const cx=[];for(let i=0;i<=4;i++){cx.push(6+i*52);}return `<svg viewBox='0 0 220 96'><line x1='0' y1='48' x2='220' y2='48' stroke='#3E9C92' stroke-width='1.4'/>${path(sineD(220,96,{n:2,A:26,mid:48}),'#C77E2A',2.4)}${cx.map(x=>`<circle cx='${x}' cy='48' r='4' fill='none' stroke='#3E9C92' stroke-width='2'/>`).join('')}<text x='60' y='90' font-size='9' fill='#22685f' font-family='monospace'>cut here = no click</text></svg>`;},
 cables:()=>`<svg viewBox='0 0 220 96'><g><circle cx='28' cy='30' r='12' fill='none' stroke='#1B2A4A' stroke-width='2'/><circle cx='24' cy='27' r='2' fill='#1B2A4A'/><circle cx='32' cy='27' r='2' fill='#1B2A4A'/><circle cx='28' cy='34' r='2' fill='#1B2A4A'/><text x='46' y='34' font-size='9' fill='#6B7791' font-family='monospace'>AES/EBU (XLR)</text></g>
   <g><circle cx='28' cy='62' r='9' fill='none' stroke='#C77E2A' stroke-width='2'/><circle cx='28' cy='62' r='3' fill='#C77E2A'/><text x='46' y='66' font-size='9' fill='#6B7791' font-family='monospace'>S/PDIF (RCA)</text></g>
   <g><rect x='150' y='22' width='16' height='16' rx='2' fill='none' stroke='#3E9C92' stroke-width='2'/><text x='150' y='52' font-size='9' fill='#6B7791' font-family='monospace'>optical</text></g></svg>`
};

/* ============ data ============ */
const G={
 conv:{k:'Conversion',t:'Analog \u21c4 digital',d:'How sound becomes numbers \u2014 and turns back into sound.'},
 level:{k:'Level & the ceiling',t:'How loud, and the hard limit',d:'The digital level scale and the wall you cannot cross.'},
 files:{k:'Files & editing',t:'Storing and working with audio',d:'What lives in the file, and how to cut it cleanly.'},
 conn:{k:'Connections',t:'Moving digital audio',d:'Cables and protocols that carry the numbers.'}
};
const C=[
 {id:'converters',name:'A/D & D/A converters',group:'conv',short:'The bridge between the analog world and the computer.',
  defn:'An <b>A/D (analog-to-digital) converter</b> measures a continuous analog voltage many times a second and turns each measurement into a number \u2014 <i>sampling</i> in time and <i>quantizing</i> in amplitude. A <b>D/A converter</b> does the reverse, turning the numbers back into a smooth analog voltage to drive speakers or headphones. Every digital recording is this round trip: source \u2192 preamp \u2192 A/D \u2192 DAW \u2192 D/A \u2192 monitors.',
  why:'It\u2019s the gateway in and out of the computer. Two things set its resolution \u2014 sample rate (time) and bit depth (amplitude) \u2014 and the converter\u2019s clock quality shapes the sound.',lab:'sampling'},
 {id:'sampleRate',name:'Sample rate',group:'conv',short:'How many samples per second \u2014 sets the frequency ceiling.',
  defn:'The number of samples captured per second, in Hz/kHz (44,100 samples/sec = <b>44.1 kHz</b>). The <b>Nyquist theorem</b> says you must sample at least twice as fast as the highest frequency you want to capture, so the ceiling is <b>sample rate \u00f7 2</b> (44.1 kHz \u2192 ~22 kHz, covering human hearing). Sample too slowly and frequencies above Nyquist <b>alias</b> \u2014 fold back as false lower tones.',
  comp:'Common rates: 44.1 kHz (CD) \u00b7 48 kHz (video/film/broadcast) \u00b7 88.2 / 96 kHz (hi-res) \u00b7 176.4 / 192 kHz',formula:'Nyquist = sample rate \u00f7 2',
  why:'It sets your frequency ceiling and the project standard \u2014 48 kHz for anything to picture, 44.1 kHz the classic music rate.',lab:'sampling'},
 {id:'bitDepth',name:'Bit depth',group:'conv',short:'Bits per sample \u2014 sets dynamic range and noise floor.',
  defn:'How many bits store each sample\u2019s amplitude. The number of possible levels is <b>2^bits</b>: 16-bit = 65,536 levels, 24-bit = ~16.7 million. More bits = finer steps = less quantization noise = more dynamic range, at roughly <b>6 dB per bit</b> (16-bit \u2248 96 dB, 24-bit \u2248 144 dB). <b>32-bit float</b> gives enormous headroom that effectively can\u2019t clip inside the DAW.',
  comp:'Common depths: 16-bit (delivery/CD) \u00b7 24-bit (recording standard) \u00b7 32-bit float (mixing & modern recorders)',formula:'dynamic range \u2248 6.02 \u00d7 bits (dB)',
  why:'Bit depth is your dynamic range and noise floor. Record at 24-bit so you have headroom and a quiet floor to work with.',lab:'bits'},

 {id:'dbfs',name:'dBFS',group:'level',short:'Decibels Full Scale \u2014 the digital level meter.',
  defn:'<b>dBFS = decibels relative to Full Scale.</b> It\u2019s the level scale of the digital domain: <b>0 dBFS is the maximum possible level</b>, and everything below it is negative (\u22126 dBFS, \u221220 dBFS\u2026). Unlike analog dBu/dBV \u2014 which have headroom above their \u201c0\u201d \u2014 digital 0 dBFS is an absolute wall.',
  why:'It\u2019s how every DAW meter reads. You gain-stage and mix to keep peaks below 0, typically leaving a few dB of headroom (peaks around \u22126 to \u22123 dBFS).',lab:'clip'},
 {id:'digitalZero',name:'Digital zero',group:'level',short:'Full scale \u2014 the loudest a digital signal can be.',
  defn:'\u201cDigital zero\u201d is <b>0 dBFS \u2014 full scale</b>, the loudest a digital signal can be. At digital zero every available bit is in use; ask for anything higher and the samples simply can\u2019t represent it. Converters often light an <b>OVER</b> indicator when samples reach it.',
  why:'It\u2019s the line you don\u2019t cross. Hit it and the next thing that happens is clipping \u2014 so it defines where your headroom runs out.',lab:'clip'},
 {id:'clipping',name:'Clipping',group:'level',short:'Past 0 dBFS the peaks chop flat \u2014 harsh distortion.',
  defn:'When a signal tries to exceed the maximum level (0 dBFS), the system can\u2019t represent the peaks, so it <b>chops them flat</b> \u2014 a distorted, flat-topped waveform. <b>Digital clipping is harsh</b> (it adds bright, gritty harmonics), unlike the softer rounding of analog clipping. Once a recording is clipped, it\u2019s very hard to fix.',
  why:'It\u2019s the most common avoidable mistake. Leave headroom below 0 dBFS so transients don\u2019t hit the wall.',lab:'clip'},

 {id:'wav',name:'.WAV',group:'files',short:'Uncompressed, lossless audio \u2014 the working format.',
  defn:'A standard <b>uncompressed PCM</b> audio file (a RIFF container). It stores the raw samples at their full sample rate and bit depth, plus a header describing the format \u2014 <b>lossless and full-quality, but large</b>. Lossy formats like MP3 and AAC throw data away to shrink size; .WAV (and AIFF on Mac) keep everything. <b>BWF</b> (Broadcast Wave) is a .WAV that also carries timecode and production metadata.',
  why:'It\u2019s the format you record, edit, and master in. Keep WAVs through production and only compress at the very end for delivery.'},
 {id:'metadata',name:'Metadata',group:'files',short:'Data about the audio \u2014 not the audio itself.',
  defn:'Information about a file that isn\u2019t the sound itself. Some is <b>essential/technical</b> \u2014 sample rate, bit depth, channel count, length \u2014 needed just to play the file correctly. Some is <b>descriptive</b> \u2014 artist, title, timecode, scene/take, notes. In production sound, BWF/iXML metadata carries timecode and scene/take info that post-production relies on to sync everything.',
  why:'Metadata makes files findable, syncable, and correctly interpreted. Lose it and you lose your organization \u2014 and sometimes the ability to sync to picture.'},
 {id:'zeroCross',name:'Zero crossing',group:'files',short:'Where the wave crosses zero \u2014 cut here for clean edits.',
  defn:'The instant a waveform <b>crosses the zero line</b> (the centerline), passing from + to \u2212 or back, where the sample value is essentially zero. <b>Edit at zero crossings to avoid clicks:</b> cut or splice where the level isn\u2019t zero and you create an instant jump \u2014 a discontinuity the speakers reproduce as a click or pop. Join at a zero crossing and the edit is seamless.',
  why:'It\u2019s the rule for clean cuts, seamless loops, and pop-free fades. Most editors can snap edits to zero crossings for you.',lab:'zero'},

 {id:'cables',name:'Digital cable types',group:'conn',short:'Connections that carry numbers, not analog voltage.',
  defn:'Cables and protocols that pass digital audio as exact data. The common ones: <b>AES/EBU (AES3)</b> \u2014 pro, balanced, on XLR (110\u03a9), usually 2 channels; <b>S/PDIF</b> \u2014 consumer, on coax RCA (75\u03a9) or optical TOSLINK, 2 channels; <b>ADAT \u201cLightpipe\u201d</b> \u2014 optical, 8 channels at 48 kHz, common for adding interface inputs; <b>MADI</b> \u2014 28\u201364 channels over coax (BNC) or optical; <b>word clock</b> \u2014 BNC, carries timing/sync only, no audio; <b>USB / Thunderbolt</b> \u2014 the computer connection; and network audio (<b>Dante / AES67 / AVB</b>) over Ethernet.',
  comp:'AES/EBU \u00b7 S/PDIF (coax + optical) \u00b7 ADAT \u00b7 MADI \u00b7 word clock \u00b7 USB/Thunderbolt \u00b7 Dante',
  why:'Digital links pass perfect copies with no generation loss \u2014 but the format must match on both ends and the devices must share a clock, or you get dropouts and clicks.'}
];

const el=(t,a={},...k)=>{const e=document.createElement(t);for(const x in a){if(x==='class')e.className=a[x];else if(x==='html')e.innerHTML=a[x];else e.setAttribute(x,a[x]);}k.flat().forEach(c=>e.append(c));return e;};

/* ============ audio engine ============ */
let actx=null,chain=null;
function ctx(){if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}return actx;}
function stopAudio(){if(chain&&actx){try{const t=actx.currentTime;chain.g.gain.cancelScheduledValues(t);chain.g.gain.setTargetAtTime(0,t,0.02);const ss=chain.sources;setTimeout(()=>ss.forEach(s=>{try{s.stop();}catch(e){}}),150);}catch(e){}}chain=null;}
function startChain(build){const c=ctx();if(!c)return null;if(c.state==='suspended')c.resume();stopAudio();try{const g=c.createGain();g.gain.value=0;g.connect(c.destination);const parts=build(c,g);chain={g,sources:parts.sources,extra:parts.extra||{}};return chain;}catch(e){return null;}}
function setVol(v){if(chain&&actx)chain.g.gain.setTargetAtTime(Math.max(0,Math.min(v,0.2)),actx.currentTime,0.02);}

/* ============ animation (resize-safe) ============ */
let anims=[];
function animate(fn){let id;function loop(t){fn(t);id=requestAnimationFrame(loop);}id=requestAnimationFrame(loop);const h={cancel(){cancelAnimationFrame(id);}};anims.push(h);return h;}
function clearAnims(){anims.forEach(h=>h.cancel());anims=[];}
function ready(cv,c){const dpr=window.devicePixelRatio||1;const w=Math.round(cv.clientWidth*dpr),h=Math.round(cv.clientHeight*dpr);if(cv.width!==w||cv.height!==h){cv.width=w;cv.height=h;}c.setTransform(dpr,0,0,dpr,0,0);}

/* ============ LAB ============ */
function station(id,title,sub){return el('div',{class:'station',id:'st-'+id},el('h3',{},title),el('div',{class:'ssub'},sub));}
function ctlRow(label,input,valEl){return el('div',{class:'ctl'},el('label',{},label),input,valEl);}
const alias=(f,fs)=>{let r=((f%fs)+fs)%fs;return r>fs/2?fs-r:r;};
const fmtHz=f=>f>=1000?(f/1000).toFixed(f%1000?1:0)+' kHz':Math.round(f)+' Hz';

function renderLab(){
  clearAnims();stopAudio();view.innerHTML='';
  view.append(el('div',{class:'eyebrow'},'Hear it \u00b7 use headphones'),el('h1',{class:'page'},'Lab'),
    el('p',{class:'lead'},'Real, generated sound \u2014 nothing pre-recorded. These four are the ones reading can\u2019t teach. Start each quiet.'));

  /* ---- Sampling & Aliasing ---- */
  const s1=station('sampling','Sampling & Aliasing','Drop the sample rate below twice the signal frequency and watch \u2014 and hear \u2014 a false lower tone appear.');
  const c1=el('canvas');const sc1=el('div',{class:'scope'},c1);
  let sig=1200,fs=8000,p1=false;
  const sigIn=el('input',{type:'range',min:'200',max:'4000',step:'10',value:String(sig)});
  const sigVal=el('div',{class:'val'},fmtHz(sig));
  const fsIn=el('input',{type:'range',min:'1500',max:'12000',step:'100',value:String(fs)});
  const fsVal=el('div',{class:'val'},fmtHz(fs));
  const b1=el('button',{class:'btn gold'},'\u25b6 Play result');
  const r1=el('div',{class:'readout'});
  s1.append(sc1,ctlRow('Signal',sigIn,sigVal),ctlRow('Sample rate',fsIn,fsVal),el('div',{class:'lab-actions'},b1,r1),
    el('div',{class:'tip',html:'<b>Notice:</b> while the sample rate stays above twice the signal (the Nyquist rule), the samples trace the real wave. Drop below it and the same dots now fit a <i>lower</i> wave \u2014 that\u2019s aliasing, and the tone you hear is that wrong, lower pitch.'}));
  view.append(s1);
  function upd1(){sig=+sigIn.value;fs=+fsIn.value;sigVal.textContent=fmtHz(sig);fsVal.textContent=fmtHz(fs);
    const ny=fs/2,a=alias(sig,fs),aliasing=sig>ny;
    r1.className='readout'+(aliasing?' warn':'');
    r1.innerHTML=aliasing?('Nyquist '+fmtHz(ny)+' \u00b7 <b>ALIASING \u2192 you hear '+fmtHz(a)+'</b>'):('Nyquist '+fmtHz(ny)+' \u00b7 <b>OK</b>');
    if(p1)updateSine(a);}
  function updateSine(f){if(chain&&chain.extra.osc)chain.extra.osc.frequency.setTargetAtTime(f,actx.currentTime,0.02);}
  sigIn.oninput=upd1;fsIn.oninput=upd1;
  b1.onclick=()=>{if(p1){stopAudio();p1=false;b1.textContent='\u25b6 Play result';b1.classList.replace('primary','gold');}else{startChain((c,g)=>{const o=c.createOscillator();o.type='sine';o.frequency.value=alias(sig,fs);o.connect(g);o.start();return{sources:[o],extra:{osc:o}};});setVol(0.14);p1=true;b1.textContent='\u25a0 Stop';b1.classList.replace('gold','primary');}};
  upd1();
  const x1=c1.getContext('2d');
  animate(t=>{ready(c1,x1);const w=c1.clientWidth,h=c1.clientHeight,mid=h/2;x1.clearRect(0,0,w,h);
    x1.strokeStyle='rgba(255,255,255,0.18)';x1.lineWidth=1;x1.beginPath();x1.moveTo(0,mid);x1.lineTo(w,mid);x1.stroke();
    const cyclesTrue=sig/600, cyclesAlias=alias(sig,fs)/600, A=h*0.34;
    // true signal (faint)
    x1.strokeStyle='rgba(203,212,227,0.5)';x1.lineWidth=1.6;x1.beginPath();for(let i=0;i<=w;i++){const y=mid-A*Math.sin(2*Math.PI*cyclesTrue*i/w);i?x1.lineTo(i,y):x1.moveTo(i,y);}x1.stroke();
    // reconstructed / alias wave (teal)
    x1.strokeStyle='#3E9C92';x1.lineWidth=2.4;x1.beginPath();for(let i=0;i<=w;i++){const y=mid-A*Math.sin(2*Math.PI*cyclesAlias*i/w);i?x1.lineTo(i,y):x1.moveTo(i,y);}x1.stroke();
    // sample points on true wave
    const dt=w*(600/sig)*(sig/fs); // px between samples mapped to the 600Hz->cycle scale
    const stepPx=w*600/ (fs* (600) ) ; // simplify below
    const nSamp=Math.floor(fs/600* (w/w) * (w/ (w)) );
    const px=w*600/fs/600*1; // px per sample
    const per=w/(sig/600); // px per true cycle
    const sampPx=w*600/fs; // px between samples on the 600Hz-per-width scale
    for(let x=0;x<=w;x+=Math.max(4,sampPx)){const y=mid-A*Math.sin(2*Math.PI*cyclesTrue*x/w);x1.fillStyle='#E0A458';x1.beginPath();x1.arc(x,y,3,0,7);x1.fill();}
  });

  /* ---- Bit depth ---- */
  const s2=station('bits','Bit Depth & Quantization','Lower the bit depth and hear the smooth tone turn to grit as the amplitude steps get coarse.');
  const c2=el('canvas');const sc2=el('div',{class:'scope'},c2);
  let bits=16,p2=false;
  const bIn=el('input',{type:'range',min:'1',max:'16',step:'1',value:'16'});
  const bVal=el('div',{class:'val'},'16-bit');
  const b2=el('button',{class:'btn gold'},'\u25b6 Play tone');
  const r2=el('div',{class:'readout'});
  s2.append(sc2,ctlRow('Bit depth',bIn,bVal),el('div',{class:'lab-actions'},b2,r2),
    el('div',{class:'tip',html:'<b>Notice:</b> at 16-bit the steps are far too fine to see or hear. As you drop toward 2\u20133 bits the staircase gets coarse and the noise floor rises into an audible buzz \u2014 that\u2019s quantization noise, and why more bits means a cleaner, quieter recording.'}));
  view.append(s2);
  function quantCurve(nb){const n=2048,curve=new Float32Array(n),lv=Math.pow(2,nb);for(let i=0;i<n;i++){const x=(i/(n-1))*2-1;curve[i]=Math.round((x*0.5+0.5)*(lv-1))/(lv-1)*2-1;}return curve;}
  function upd2(){bits=+bIn.value;bVal.textContent=bits+'-bit';const dr=(6.02*bits).toFixed(0);r2.innerHTML='2^'+bits+' levels \u00b7 <b>\u2248 '+dr+' dB</b> dynamic range';if(p2&&chain&&chain.extra.ws)chain.extra.ws.curve=quantCurve(bits);}
  bIn.oninput=upd2;
  b2.onclick=()=>{if(p2){stopAudio();p2=false;b2.textContent='\u25b6 Play tone';b2.classList.replace('primary','gold');}else{startChain((c,g)=>{const o=c.createOscillator();o.type='sine';o.frequency.value=330;const ws=c.createWaveShaper();ws.curve=quantCurve(bits);ws.oversample='none';o.connect(ws).connect(g);o.start();return{sources:[o],extra:{ws}};});setVol(0.13);p2=true;b2.textContent='\u25a0 Stop';b2.classList.replace('gold','primary');}};
  upd2();
  const x2=c2.getContext('2d');
  animate(()=>{ready(c2,x2);const w=c2.clientWidth,h=c2.clientHeight,mid=h/2,A=h*0.34,lv=Math.pow(2,bits);x2.clearRect(0,0,w,h);
    if(lv<=64){x2.strokeStyle='rgba(255,255,255,0.07)';x2.lineWidth=1;for(let k=0;k<lv;k++){const y=mid-((k/(lv-1))*2-1)*A;x2.beginPath();x2.moveTo(0,y);x2.lineTo(w,y);x2.stroke();}}
    x2.strokeStyle='rgba(203,212,227,0.45)';x2.lineWidth=1.5;x2.beginPath();for(let i=0;i<=w;i++){const y=mid-A*Math.sin(2*Math.PI*2*i/w);i?x2.lineTo(i,y):x2.moveTo(i,y);}x2.stroke();
    x2.strokeStyle='#C77E2A';x2.lineWidth=2.4;x2.beginPath();let first=true;for(let i=0;i<=w;i+=2){const v=Math.sin(2*Math.PI*2*i/w);const q=Math.round((v*0.5+0.5)*(lv-1))/(lv-1)*2-1;const y=mid-q*A;if(first){x2.moveTo(i,y);first=false;}else{x2.lineTo(i,y);}}x2.stroke();});

  /* ---- Clipping & dBFS ---- */
  const s3=station('clip','Clipping & 0 dBFS','Push the level past 0 dBFS and watch the peaks chop flat \u2014 and hear the harshness arrive.');
  const c3=el('canvas');const sc3=el('div',{class:'scope'},c3);
  let inDb=-6,p3=false;
  const dIn=el('input',{type:'range',min:'-24',max:'12',step:'1',value:'-6'});
  const dVal=el('div',{class:'val'},'-6 dBFS');
  const b3=el('button',{class:'btn gold'},'\u25b6 Play tone');
  const r3=el('div',{class:'readout'});
  s3.append(sc3,ctlRow('Input level',dIn,dVal),el('div',{class:'lab-actions'},b3,r3),
    el('div',{class:'tip',html:'<b>Notice:</b> below 0 dBFS the wave is a clean sine and the meter sits in the green. Push above 0 and the tops flatten, the meter pins red at <b>OVER</b>, and the tone gets brittle \u2014 that\u2019s digital clipping, and it\u2019s baked in permanently once recorded.'}));
  view.append(s3);
  const driveLin=()=>Math.pow(10,inDb/20);
  function clipCurve(){const n=1024,curve=new Float32Array(n);for(let i=0;i<n;i++){let x=(i/(n-1))*2-1;curve[i]=Math.max(-1,Math.min(1,x));}return curve;}
  function upd3(){inDb=+dIn.value;dVal.textContent=inDb+' dBFS';const over=inDb>0;r3.className='readout'+(over?' warn':'');r3.innerHTML=over?('Peak <b>0.0 dBFS \u2014 OVER</b> (clipping)'):('Peak <b>'+inDb.toFixed(0)+' dBFS</b> \u00b7 clean');if(p3&&chain&&chain.extra.drive)chain.extra.drive.gain.setTargetAtTime(driveLin(),actx.currentTime,0.02);}
  dIn.oninput=upd3;
  b3.onclick=()=>{if(p3){stopAudio();p3=false;b3.textContent='\u25b6 Play tone';b3.classList.replace('primary','gold');}else{startChain((c,g)=>{const o=c.createOscillator();o.type='sine';o.frequency.value=220;const drive=c.createGain();drive.gain.value=driveLin();const ws=c.createWaveShaper();ws.curve=clipCurve();ws.oversample='4x';o.connect(drive).connect(ws).connect(g);o.start();return{sources:[o],extra:{drive}};});setVol(0.16);p3=true;b3.textContent='\u25a0 Stop';b3.classList.replace('gold','primary');}};
  upd3();
  const x3=c3.getContext('2d');
  animate(t=>{ready(c3,x3);const w=c3.clientWidth,h=c3.clientHeight,mid=h/2,full=h*0.40;x3.clearRect(0,0,w,h);
    const top=mid-full,bot=mid+full;
    x3.strokeStyle='rgba(199,85,62,0.5)';x3.lineWidth=1.4;x3.setLineDash([4,3]);[top,bot].forEach(y=>{x3.beginPath();x3.moveTo(0,y);x3.lineTo(w-40,y);x3.stroke();});x3.setLineDash([]);
    x3.fillStyle='rgba(199,85,62,0.6)';x3.font='10px monospace';x3.fillText('0 dBFS',6,top-4);
    const dl=driveLin(),ph=t/1000*3;x3.strokeStyle=inDb>0?'#C7553E':'#E0A458';x3.lineWidth=2.6;x3.beginPath();
    for(let i=0;i<=w-40;i++){let v=dl*Math.sin(2*Math.PI*3*i/w+ph);if(v>1)v=1;if(v<-1)v=-1;const y=mid-v*full;i?x3.lineTo(i,y):x3.moveTo(i,y);}x3.stroke();
    // meter
    const mx=w-26;x3.fillStyle='rgba(255,255,255,0.10)';x3.fillRect(mx,top,16,bot-top);
    const lvl=Math.min(dl,1),mh=(bot-top)*lvl;x3.fillStyle=inDb>0?'#C7553E':'#3E9C92';x3.fillRect(mx,bot-mh,16,mh);
    if(inDb>0){x3.fillStyle='#C7553E';x3.fillRect(mx,top-6,16,5);}});

  /* ---- Zero crossing ---- */
  const s4=station('zero','Zero-Crossing Edits','Loop a splice made at a zero crossing, then off it \u2014 the same edit, but one clicks every loop.');
  const c4=el('canvas');const sc4=el('div',{class:'scope'},c4);
  let snap=true,p4=false;
  const snapBtn=el('button',{class:'btn tog','aria-pressed':'true'},'Snap to zero crossing: ON');
  const b4=el('button',{class:'btn gold'},'\u25b6 Loop it');
  const r4=el('div',{class:'readout'});
  s4.append(sc4,el('div',{class:'lab-actions'},b4,snapBtn,r4),
    el('div',{class:'notice',html:'The two versions are the exact same tone \u2014 the only difference is <i>where</i> the loop is cut. Off the zero crossing, every loop boundary is a tiny vertical jump, and you hear it as a click. This is why editors snap cuts, loops, and fades to zero crossings.'}));
  view.append(s4);
  function makeLoopBuf(c,clean){const f=220,sr=c.sampleRate;const cycles=clean?20:20.5;const len=Math.round(sr*cycles/f);const buf=c.createBuffer(1,len,sr);const d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=0.5*Math.sin(2*Math.PI*f*i/sr);return buf;}
  function startLoop(){startChain((c,g)=>{const src=c.createBufferSource();src.buffer=makeLoopBuf(c,snap);src.loop=true;src.connect(g);src.start();return{sources:[src],extra:{}};});setVol(0.16);}
  function upd4(){snapBtn.textContent='Snap to zero crossing: '+(snap?'ON':'OFF');snapBtn.setAttribute('aria-pressed',String(snap));r4.className='readout'+(snap?'':' warn');r4.innerHTML=snap?'Loop joins at <b>zero \u2014 clean</b>':'Loop joins <b>mid-cycle \u2014 clicks</b>';}
  snapBtn.onclick=()=>{snap=!snap;upd4();if(p4)startLoop();};
  b4.onclick=()=>{if(p4){stopAudio();p4=false;b4.textContent='\u25b6 Loop it';b4.classList.replace('primary','gold');}else{startLoop();p4=true;b4.textContent='\u25a0 Stop';b4.classList.replace('gold','primary');}};
  upd4();
  const x4=c4.getContext('2d');
  animate(()=>{ready(c4,x4);const w=c4.clientWidth,h=c4.clientHeight,mid=h/2,A=h*0.32;x4.clearRect(0,0,w,h);
    x4.strokeStyle='rgba(62,156,146,0.6)';x4.lineWidth=1.2;x4.beginPath();x4.moveTo(0,mid);x4.lineTo(w,mid);x4.stroke();
    const splice=w*0.62;
    x4.strokeStyle='#C77E2A';x4.lineWidth=2.4;x4.beginPath();for(let i=0;i<=splice;i++){const y=mid-A*Math.sin(2*Math.PI*4*i/w);i?x4.lineTo(i,y):x4.moveTo(i,y);}x4.stroke();
    // second segment after splice: clean continues from 0; off jumps from a peak
    x4.strokeStyle=snap?'#C77E2A':'#C7553E';x4.beginPath();
    if(snap){for(let i=splice;i<=w;i++){const y=mid-A*Math.sin(2*Math.PI*4*(i-splice)/w);i===splice?x4.moveTo(i,y):x4.lineTo(i,y);}}
    else{x4.moveTo(splice,mid-A);for(let i=splice;i<=w;i++){const y=mid-A*Math.cos(2*Math.PI*4*(i-splice)/w);i===splice?x4.moveTo(i,y):x4.lineTo(i,y);}}
    x4.stroke();
    x4.strokeStyle='rgba(255,255,255,0.35)';x4.setLineDash([3,3]);x4.lineWidth=1;x4.beginPath();x4.moveTo(splice,12);x4.lineTo(splice,h-12);x4.stroke();x4.setLineDash([]);
    x4.fillStyle=snap?'#3E9C92':'#C7553E';x4.font='10px monospace';x4.fillText(snap?'seamless join':'jump = click',splice+6,20);});
}

/* ============ flashcards ============ */
let fcQueue=[];
function renderCards(){
  clearAnims();stopAudio();view.innerHTML='';
  view.append(el('div',{class:'eyebrow'},'Active recall'),el('h1',{class:'page'},'Flashcards'),
    el('p',{class:'lead'},'See the term, then out loud give its definition, a number or formula if it has one, and one place it shows up. Reveal to check; mark \u201cGot it\u201d only when you had it.'));
  const t=el('div',{class:'lab-actions'},el('button',{class:'btn ghost sm'},'Restart deck'),el('button',{class:'btn ghost sm'},'Drill the unmastered'));
  view.append(t,el('div',{id:'fcHost'}));
  t.children[0].onclick=()=>{fcQueue=shuffle(C.map(c=>c.id));drawCard();};
  t.children[1].onclick=()=>{const weak=C.filter(c=>(store.mastered[c.id]||0)<2).map(c=>c.id);fcQueue=shuffle(weak.length?weak:C.map(c=>c.id));drawCard();};
  if(!fcQueue.length)fcQueue=shuffle(C.map(c=>c.id));
  drawCard();
}
function drawCard(){
  const host=document.getElementById('fcHost');if(!host)return;host.innerHTML='';
  if(!fcQueue.length){host.append(el('div',{class:'stage'},el('div',{class:'bigscore',html:'\u2713'}),el('p',{class:'prompt'},'Deck complete. '+masteredCount()+' of '+TOTAL+' terms mastered.'),el('div',{class:'actions'},el('button',{class:'btn primary'},'Go again'))));host.querySelector('.btn').onclick=()=>{fcQueue=shuffle(C.map(c=>c.id));drawCard();};return;}
  const c=byId[fcQueue[0]],done=TOTAL-fcQueue.length+1;
  const stage=el('div',{class:'stage'},el('div',{class:'counter'},'Card '+done+' of '+TOTAL+(((store.mastered[c.id]||0)>=2)?' \u00b7 mastered':'')),
    el('div',{class:'art',html:VIZ[c.id]()}),el('h3',{style:'margin:6px 0 0;font-size:21px'},c.name),
    el('div',{class:'prompt'},G[c.group].k),el('div',{id:'fcReveal'}));
  host.append(stage);
  const rev=stage.querySelector('#fcReveal');rev.append(el('div',{class:'actions'},el('button',{class:'btn primary'},'Reveal answer')));
  rev.querySelector('.btn').onclick=()=>showBack(c);
}
function showBack(c){
  const rev=document.getElementById('fcReveal');rev.innerHTML='';
  const block=el('div',{class:'reveal'},el('p',{html:c.defn}));
  if(c.comp)block.append(el('div',{class:'note comp',html:'<b>Worth knowing \u2014 </b>'+c.comp}));
  if(c.formula)block.append(el('div',{class:'formula',html:c.formula}));
  block.append(el('div',{class:'note why',html:'<b>On a session \u2014 </b>'+c.why}));
  rev.append(block,el('div',{class:'actions'},el('button',{class:'btn again'},'Review again'),el('button',{class:'btn ok'},'Got it')));
  const[a,o]=rev.querySelectorAll('.actions .btn');
  a.onclick=()=>{fcQueue.push(fcQueue.shift());drawCard();};
  o.onclick=()=>{store.mastered[c.id]=(store.mastered[c.id]||0)+1;save();refreshProgress();fcQueue.shift();drawCard();};
}

let quiz={list:[],i:0,score:0,wrong:[]};
function renderQuiz(){clearAnims();stopAudio();view.innerHTML='';view.append(el('div',{class:'eyebrow'},'Check the connections'),el('h1',{class:'page'},'Quiz'),el('div',{id:'qHost'}));startQuiz();}
function startQuiz(){quiz={list:shuffle(QPOOL).slice(0,10),i:0,score:0,wrong:[]};drawQ();}
function drawQ(){
  const host=document.getElementById('qHost');if(!host)return;host.innerHTML='';
  if(quiz.i>=quiz.list.length){if(quiz.score>store.quizBest){store.quizBest=quiz.score;save();}
    const stage=el('div',{class:'stage'},el('div',{class:'bigscore',html:quiz.score+'<span>/'+quiz.list.length+'</span>'}),
      el('p',{class:'prompt'},quiz.score===quiz.list.length?'Perfect \u2014 the numbers and the reasons are locked in.':quiz.score>=8?'Strong. Clean up the few below.':'Good start \u2014 revisit these in Learn and the Lab, then run it again.'),
      el('div',{class:'scorebar'},'Best so far: '+store.quizBest+'/10'));
    if(quiz.wrong.length){const l=el('div',{class:'explain on',style:'max-width:520px'},el('b',{},'Worth another look: '),quiz.wrong.join('; '));stage.append(l);}
    stage.append(el('div',{class:'actions'},el('button',{class:'btn primary'},'New quiz'),el('button',{class:'btn ghost'},'Back to the Lab')));
    host.append(stage);const[a,b]=stage.querySelectorAll('.actions .btn');a.onclick=startQuiz;b.onclick=()=>setTab('lab');return;}
  const item=quiz.list[quiz.i];const stage=el('div',{class:'stage'});
  stage.append(el('div',{class:'scorebar'},'Question '+(quiz.i+1)+' of '+quiz.list.length+' \u00b7 Score '+quiz.score));
  stage.append(el('div',{class:'prompt',style:'font-size:16px;color:var(--ink)'},item.q));
  const opts=el('div',{class:'opts'});
  shuffle(item.opts).forEach(o=>{const b=el('button',{class:'opt'},o);b.onclick=()=>answerQ(b,o,item,stage);opts.append(b);});
  stage.append(opts,el('div',{class:'explain',id:'qEx'}));host.append(stage);
}
function answerQ(btn,choice,item,stage){
  stage.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(b.textContent===item.a)b.classList.add('correct');});
  if(choice===item.a)quiz.score++;else{btn.classList.add('wrong');quiz.wrong.push(item.a);}
  const ex=stage.querySelector('#qEx');ex.innerHTML=item.ex;ex.classList.add('on');
  const next=el('div',{class:'actions'},el('button',{class:'btn primary'},quiz.i===quiz.list.length-1?'See results':'Next'));
  ex.after(next);next.querySelector('.btn').onclick=()=>{quiz.i++;drawQ();};
}
